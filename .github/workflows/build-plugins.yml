name: Build Plugins

on:
  push:
    branches: [ "main" ]
    paths:
      - "plugins-src/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Encode Plugin Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build all plugins from source
        run: |
          mkdir -p plugins

          get_value() {
            local file="$1"
            local key="$2"
            local line
            line=$(grep -E "^${key}[[:space:]]*=" "$file" | head -n 1)
            if [ -z "$line" ]; then echo ""; return; fi
            local raw="${line#*=}"
            raw=$(echo "$raw" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            raw=$(echo "$raw" | sed -e 's/^"//' -e 's/"$//')
            echo "$raw"
          }

          echo "[plugin]" > index.toml
          echo "items = [" >> index.toml

          for type_dir in plugins-src/*/; do
            [ -d "$type_dir" ] || continue

            for src_file in "$type_dir"*.wp; do
              [ -f "$src_file" ] || continue
              plugin_id=$(basename "$src_file" .wp)
              plugin_name=$(get_value "$src_file" "name")

              echo "  { id = \"${plugin_id}\", name = \"${plugin_name}\" }," >> index.toml
            done
          done

          echo "]" >> index.toml

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/ index.toml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild plugins from source [auto]"
            git push
          fi